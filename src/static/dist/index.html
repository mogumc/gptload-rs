<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gptload-rs Admin</title>
  <link rel="stylesheet" href="/web/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-header">
    <div><h1>gptload-rs</h1></div>
    <div class="form-row">
      <input id="token" type="password" placeholder="Admin Token" style="width:200px; padding:6px 8px;" />
      <button class="btn btn-primary" id="saveToken">连接</button>
      <button class="btn" id="clearToken">断开</button>
      <button class="btn" id="themeToggle">主题</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-page="main">主页</button>
    <button class="nav-btn" data-page="upstreams">上游管理</button>
    <button class="nav-btn" data-page="keys">密钥管理</button>
  </div>

  <!-- Page 1: Main -->
  <div id="page-main" class="page active">
    <div class="card" style="margin-bottom: 16px;">
      <h2>实时状态</h2>
      <div id="statsGrid" class="stats-grid"></div>
    </div>
    <div class="row">
      <div class="col" style="min-width: 500px;">
        <div class="card" style="display:flex; flex-direction:column; min-height: 360px; max-height: 360px;">
          <h2>请求统计</h2>
          <div class="toolbar">
            <select id="requestsWindow" style="padding:6px 8px;">
              <option value="minute">最近 60 分钟</option>
              <option value="hour">最近 48 小时</option>
              <option value="day">最近 30 天</option>
            </select>
            <button class="btn" id="refreshRequestsChart">刷新</button>
            <span id="requestsChartInfo" class="muted small"></span>
          </div>
          <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
            <canvas id="requestsChart" style="width:100%; height:180px;"></canvas>
          </div>
          <div class="muted small">蓝线=总请求，绿线=成功(2xx)，灰线=失败。</div>
        </div>
      </div>
      <div class="col" style="min-width: 500px;">
        <div class="card" style="display:flex; flex-direction:column; min-height: 360px; max-height: 360px;">
          <h2>最近请求</h2>
          <div class="toolbar">
            <button class="btn" id="refreshRequests">刷新</button>
            <button class="btn" id="toggleRequestsStream">实时流</button>
            <span id="requestsInfo" class="muted small"></span>
          </div>
          <div style="flex:1; overflow:auto;">
            <table id="requestsTable">
              <thead><tr><th>时间</th><th>IP</th><th>模型</th><th>状态</th><th>耗时</th><th>Tokens</th><th>上游</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Page 2: Upstreams -->
  <div id="page-upstreams" class="page">
    <div class="row">
      <div class="col" style="min-width: 400px; max-width: 500px;">
        <div class="card" style="min-height: 400px; max-height: 700px; overflow-y: auto;">
          <h2>新增 / 编辑上游</h2>
          <div class="form-group">
            <label>选择已有上游（编辑）</label>
            <select id="upstreamManageSelect"></select>
          </div>
          <div class="form-group">
            <label>ID</label>
            <input id="upstreamId" type="text" placeholder="openai" />
          </div>
          <div class="form-group">
            <label>Base URL</label>
            <input id="upstreamBaseUrl" type="text" placeholder="https://api.openai.com" />
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:1"><label>权重</label><input id="upstreamWeight" type="number" min="1" step="1" placeholder="1" /></div>
            <div class="form-group" style="flex:1"><label>格式</label>
              <select id="upstreamFormat"><option value="">auto</option><option value="openai">openai</option><option value="anthropic">anthropic</option><option value="gemini">gemini</option></select>
            </div>
          </div>
          <div class="form-group">
            <label>代理（可选）</label>
            <input id="upstreamProxy" type="text" placeholder="socks5://127.0.0.1:1080" />
          </div>
          <div class="toolbar">
            <button class="btn btn-primary" id="addUpstream">新增</button>
            <button class="btn" id="updateUpstream">更新</button>
            <button class="btn btn-danger" id="deleteUpstream">删除</button>
            <label class="small muted" style="display:flex; align-items:center; gap:4px;"><input type="checkbox" id="deleteUpstreamKeys" /> 同时删除 Keys</label>
          </div>
        </div>
        <div class="card" style="margin-top: 16px; min-height: 200px; max-height: 350px; overflow-y: auto;">
          <h2>模型发现</h2>
          <div class="form-group"><label>选择上游</label><select id="modelUpstreamSelect"></select></div>
          <div class="toolbar">
            <button class="btn" id="refreshModels">拉取模型</button>
            <button class="btn btn-primary" id="applyModels">应用到路由</button>
            <button class="btn" id="selectAllModels">全选</button>
            <button class="btn" id="selectNoneModels">全不选</button>
          </div>
          <div id="modelsInfo" class="muted small"></div>
          <div id="modelsList" style="max-height:180px; overflow:auto; border:1px solid var(--border); border-radius:6px; padding:6px;"></div>
        </div>
      </div>
      <div class="col">
        <div class="card" style="min-height: 400px; max-height: 700px; display:flex; flex-direction:column;">
          <h2>上游列表</h2>
          <div class="toolbar">
            <button class="btn" id="refreshUpstreams">刷新</button>
            <span id="upstreamsInfo" class="muted small"></span>
          </div>
          <div id="upstreamsList" class="virtual-scroll" style="flex:1; overflow-y:auto;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Page 3: Keys -->
  <div id="page-keys" class="page">
    <div class="row">
      <div class="col" style="min-width: 350px; max-width: 450px;">
        <div class="card" style="min-height: 400px; max-height: 600px; overflow-y: auto;">
          <h2>导入 / 导出密钥</h2>
          <div class="form-group"><label>选择上游</label><select id="upstreamSelect"></select></div>
          <div class="form-group">
            <label>操作模式</label>
            <div class="form-row">
              <label><input type="radio" name="mode" value="add" checked /> 追加</label>
              <label><input type="radio" name="mode" value="replace" /> 替换</label>
              <label><input type="radio" name="mode" value="delete" /> 删除</label>
            </div>
          </div>
          <div class="form-group"><label>密钥列表（每行一个）</label><textarea id="keysInput" placeholder="sk-xxx...&#10;sk-yyy..."></textarea></div>
          <div class="toolbar">
            <button class="btn btn-primary" id="submitKeys">提交</button>
            <button class="btn" id="clearKeys">清空</button>
            <button class="btn" id="exportKeys" style="margin-left:auto;">导出</button>
          </div>
        </div>
      </div>
      <div class="col">
        <div class="card" style="min-height: 400px; max-height: 600px; display:flex; flex-direction:column;">
          <h2>密钥状态</h2>
          <div class="toolbar">
            <select id="keyStatusUpstreamSelect" style="min-width:160px;"></select>
            <input id="keySearch" type="search" placeholder="搜索密钥" style="min-width:180px;" />
            <select id="keyFilter"><option value="all">全部状态</option><option value="active">active</option><option value="invalid">invalid</option></select>
            <select id="keySort"><option value="index">默认排序</option><option value="failure_desc">失败次数</option><option value="latency_desc">P90 延迟</option></select>
            <button class="btn" id="loadKeyStatus">刷新</button>
          </div>
          <div class="toolbar">
            <button class="btn" id="keyStatusPrev">上一页</button>
            <button class="btn" id="keyStatusNext">下一页</button>
            <select id="keyStatusPageSize"><option value="50">50</option><option value="100" selected>100</option><option value="200">200</option></select>
            <span id="keyStatusPageInfo" class="muted small"></span>
            <span style="flex:1"></span>
            <button class="btn" id="releaseAllKeys">恢复全部</button>
            <button class="btn btn-danger" id="banAllKeys">失效全部</button>
          </div>
          <div style="flex:1; overflow:auto;">
            <table id="keyStatusTable">
              <thead><tr><th>#</th><th>密钥</th><th>状态</th><th>失败</th><th>并发</th><th>延迟 p50/p90/p99</th><th>操作</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
          <div id="keyStatusInfo" class="muted small" style="margin-top: 8px;"></div>
        </div>
        <div class="card" style="margin-top: 16px;">
          <h2>密钥延迟分布</h2>
          <canvas id="keyLatencyChart" style="width:100%; height:160px;"></canvas>
        </div>
      </div>
    </div>
  </div>

<script src="/web/app.js"></script>
</body>
</html>
