version: '3.8'

services:
  gptload:
    build: .
    container_name: gptload-rs
    ports:
      - "8080:8080"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - gptload-data:/app/data
    restart: unless-stopped
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  gptload-data:
