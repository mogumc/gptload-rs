# ============================================================
# gptload-rs 配置示例
# ============================================================

# 代理监听地址（HTTP），/admin 管理后台同端口
listen_addr = "0.0.0.0:8080"

# Tokio 工作线程数，省略则自动取 CPU 核心数
# worker_threads = 4

# 上游请求超时（毫秒），含连接+响应
request_timeout_ms = 60000

# 最大重试次数，0 为禁用重试
max_retries = 5

# 触发重试的上游 HTTP 状态码，省略时默认 [429]
retry_status_codes = [429, 500, 502, 503, 504, 401, 403]

# 代理流量鉴权令牌（可选），客户端须携带 X-Proxy-Token 头
# 省略或留空则不校验
# proxy_tokens = ["proxy-token-1"]

# 管理后台鉴权令牌（必填），API 须携带 X-Admin-Token，SSE 使用 ?token=
# 公网部署请务必设置强密码
admin_tokens = ["admin-token-1"]

# 敏感操作导出令牌，客户端须携带 X-Export-Token 头
export_token = "your-export-secret"

# 持久化数据目录（sled 内嵌数据库），不存在则自动创建
data_dir = "./data"

# ── 服务端行为 ──────────────────────────────────────────────
[server]
# 优雅关闭等待时间（秒）：收到 SIGINT/SIGTERM 后等待进行中请求完成
graceful_shutdown_timeout_secs = 30

# 浏览器跨域白名单，["*"] 允许任意来源
cors_origins = ["*"]

# 请求排队：当所有密钥繁忙/冷却时排队等待，而非直接返回 503
queue_enabled = false
queue_max_depth = 100          # 最大排队数
queue_timeout_ms = 10000       # 排队超时（毫秒）

# ── 密钥全局行为 ────────────────────────────────────────────
[key]
# 认证失败阈值（401/403），达到后自动标记失效，0 为禁用
blacklist_threshold = 3

# 单密钥最大并发，超过则跳过选择，0 为不限制
max_concurrent_per_key = 5

# 遇到 429 且无 Retry-After 时的默认冷却（毫秒）
rate_limit_cooldown_ms = 3000

# Retry-After 冷却上限（毫秒），防止上游返回过长冷却
max_rate_limit_cooldown_ms = 30000

# 失效密钥自动恢复检测间隔（秒）
revalidation_interval_secs = 300

# 每次恢复检测请求超时（秒）
revalidation_timeout_secs = 20